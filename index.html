<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI公共服务平台 · 功能逻辑流程图</title>
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --panel:#1c2330; --line:#2a3340;
  --txt:#e6edf3; --dim:#9aa7b5; --faint:#6b7785;
  --sys1:#4f9dff; --sys2:#16c79a;
  --l1:#7c5cff; --l2:#ff9f43; --l3:#21bf73; --l4:#ff6b9d;
  --accent:#4f9dff; --card:#212a39; --shadow:0 6px 24px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Microsoft YaHei","PingFang SC","Segoe UI",system-ui,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#16243a 0%,var(--bg) 55%);
  color:var(--txt); line-height:1.6; overflow-x:hidden;
}
a{color:inherit}
.wrap{max-width:1400px;margin:0 auto;padding:0 22px 80px}

/* Header */
header{padding:34px 0 18px;text-align:center;position:relative}
header h1{font-size:30px;font-weight:800;letter-spacing:1px;
  background:linear-gradient(90deg,var(--sys1),var(--sys2));
  -webkit-background-clip:text;background-clip:text;color:transparent}
header .sub{color:var(--dim);font-size:14px;margin-top:8px}
.stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:22px 0 6px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:12px 22px;min-width:120px;box-shadow:var(--shadow)}
.stat .n{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:12px;color:var(--dim);margin-top:2px}

/* Toolbar */
.toolbar{position:sticky;top:0;z-index:50;background:rgba(13,17,23,.82);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:12px 0;margin-bottom:8px}
.toolbar .inner{max-width:1400px;margin:0 auto;padding:0 22px;display:flex;
  gap:12px;align-items:center;flex-wrap:wrap}
.crumbs{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--dim);flex:1;min-width:200px}
.crumbs b{color:var(--txt)}
.crumbs span.sep{color:var(--faint)}
.crumbs .c{cursor:pointer;padding:3px 8px;border-radius:6px}
.crumbs .c:hover{background:var(--panel);color:var(--txt)}
.search{position:relative}
.search input{background:var(--panel);border:1px solid var(--line);border-radius:9px;
  color:var(--txt);padding:9px 32px 9px 12px;width:230px;font-size:13px;outline:none}
.search input:focus{border-color:var(--accent)}
.btn{background:var(--panel);border:1px solid var(--line);color:var(--dim);
  border-radius:9px;padding:9px 14px;cursor:pointer;font-size:13px;transition:.15s}
.btn:hover{color:var(--txt);border-color:var(--accent)}
.btn.active{background:var(--accent);color:#06121f;border-color:var(--accent);font-weight:700}

/* Overview map */
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.platform-node{margin:18px auto 8px;max-width:520px;text-align:center;
  background:linear-gradient(135deg,#1d3a5f,#143f3a);border:1px solid #2f5070;
  border-radius:16px;padding:16px 20px;box-shadow:var(--shadow)}
.platform-node .t{font-size:19px;font-weight:800}
.platform-node .d{font-size:12px;color:var(--dim);margin-top:3px}
.trunk{width:2px;height:26px;background:linear-gradient(var(--line),transparent);margin:0 auto}

.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:6px}
@media(max-width:880px){.sys-grid{grid-template-columns:1fr}}
.sys-col{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px;
  box-shadow:var(--shadow)}
.sys-col h2{font-size:17px;display:flex;align-items:center;gap:9px;margin-bottom:4px}
.sys-col .dot{width:11px;height:11px;border-radius:50%}
.sys-col.s1 .dot{background:var(--sys1);box-shadow:0 0 10px var(--sys1)}
.sys-col.s2 .dot{background:var(--sys2);box-shadow:0 0 10px var(--sys2)}
.sys-col .meta{font-size:12px;color:var(--dim);margin-bottom:14px;padding-left:20px}
.mod-list{display:flex;flex-direction:column;gap:10px}
.mod-card{background:var(--card);border:1px solid var(--line);border-radius:11px;
  padding:12px 14px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.mod-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.s1 .mod-card:before{background:var(--sys1)}
.s2 .mod-card:before{background:var(--sys2)}
.mod-card:hover{transform:translateX(4px);border-color:var(--accent);background:#26303f}
.mod-card .mt{font-size:15px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.mod-card .badge{font-size:11px;color:var(--dim);background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:2px 10px;font-weight:500}
.mod-card .preview{font-size:12px;color:var(--faint);margin-top:6px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

/* Module detail flow */
#detail-head{margin:14px 0 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#detail-head .title{font-size:22px;font-weight:800}
#detail-head .tag{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}

/* Tree flow (indented connector style) */
.tree{margin-top:4px}
.tnode{position:relative}
.tnode .row{display:flex;align-items:flex-start;gap:0;margin:5px 0}
.node-card{position:relative;border-radius:10px;padding:9px 13px;cursor:default;
  border:1px solid var(--line);background:var(--card);transition:.15s;
  display:flex;align-items:center;gap:9px;min-height:40px}
.node-card.has-children{cursor:pointer}
.node-card.has-children:hover{border-color:var(--accent)}
.node-card .tog{width:18px;height:18px;border-radius:5px;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--dim);
  flex:0 0 auto;font-weight:700}
.node-card.open .tog{background:var(--accent);color:#06121f;border-color:var(--accent)}
.node-card .nm{font-weight:600;font-size:14px}
.node-card .ct{font-size:11px;color:var(--faint);margin-left:2px}
.node-card.lv1{border-left:4px solid var(--l1)}
.node-card.lv2{border-left:4px solid var(--l2)}
.node-card.lv3{border-left:4px solid var(--l3)}
.node-card.lv4{border-left:4px solid var(--l4)}
.node-card.leaf{background:var(--panel)}
.node-card .desc-i{margin-left:6px;font-size:11px;color:var(--faint);
  border:1px solid var(--line);border-radius:5px;width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto}
.node-card .desc-i:hover{color:var(--accent);border-color:var(--accent)}
.children{margin-left:26px;padding-left:16px;border-left:1px dashed var(--line);
  overflow:hidden}
.children.collapsed{display:none}
.leaf-desc{font-size:12.5px;color:var(--dim);background:var(--bg2);border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;margin:2px 0 8px 26px;display:none;max-width:760px;line-height:1.65}
.leaf-desc.show{display:block;animation:fade .2s}

.hl{background:#5a4a00;color:#ffe680;border-radius:3px;padding:0 2px}

/* legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 18px;font-size:12px;color:var(--dim)}
.legend .it{display:flex;align-items:center;gap:6px}
.legend .sw{width:14px;height:14px;border-radius:3px}

footer{text-align:center;color:var(--faint);font-size:12px;margin-top:40px;
  border-top:1px solid var(--line);padding-top:18px}
.empty{text-align:center;color:var(--faint);padding:60px 0}

</style>
</head>
<body>
<div class="toolbar">
  <div class="inner">
    <div class="crumbs" id="crumbs"></div>
    <div class="search">
      <input id="q" type="text" placeholder="搜索功能 / 模块…">
    </div>
    <button class="btn" id="btnExpand">展开全部</button>
    <button class="btn" id="btnCollapse">收起</button>
    <button class="btn" id="btnHome">总览</button>
  </div>
</div>

<div class="wrap">
  <header>
    <h1>AI公共服务平台 · 功能逻辑流程图</h1>
    <div class="sub">基于《AI公共服务平台功能清单 V1.0》解析 · 双子系统 / 12 大功能模块 / 多级功能树</div>
    <div class="stats" id="stats"></div>

  <!-- Overview -->
  <div class="view on" id="view-overview">

    <div class="trunk"></div>
    <div class="sys-grid" id="sysGrid"></div>
  </div>

  <!-- Detail -->
  <div class="view" id="view-detail">
    <div id="detail-head"></div>
    <div class="legend">
      <div class="it"><span class="sw" style="background:var(--l1)"></span>一级模块</div>
      <div class="it"><span class="sw" style="background:var(--l2)"></span>二级模块</div>
      <div class="it"><span class="sw" style="background:var(--l3)"></span>三级模块</div>
      <div class="it"><span class="sw" style="background:var(--l4)"></span>四级模块</div>
      <div class="it">点击节点展开/收起 · 点击 <b>i</b> 查看功能说明</div>
    </div>
    <div class="tree" id="tree"></div>
  </div>

  <footer>
    AI公共服务平台功能清单可视化 · 共 <span id="fLeaf"></span> 项末级功能 · 数据源：功能清单 V1.0
  </footer>
</div>

", "desc": "为统一向用户提供媒体培训，包括音频课程培训、视频课程培训、文档课程培训，系统支持对HTML5浏览器可处理的音视频（MP4、 MP3、AAC、JPG、PNG和GIF）、图片格式的课程内容进行维护管理。", "children": [], "seq": "14"}, {"name": "课程梳理服务", "desc": "围绕第三方引入的课程资源，提供线上课程资料梳理服务，让管理员更好地整理和上线课程内容。", "children": [], "seq": "15"}], "seq": "10"}, {"name": "培训学习管理", "desc": "", "children": [{"name": "个人信息管理", "desc": "建立用户个人线上培训档案，提供用户历史培训记录查阅、课程收藏、个人笔记管理，并实现课程偏好分析，完成用户偏好课程的精准推介。", "children": [], "seq": "16"}, {"name": "学习记录管理", "desc": "用户在进行线上培训课程学习时，系统会记录用户与本课程相关的培训学习进度和学习笔记。支持课程学习进度的自动记忆和学习笔记关联，实现断点学习，为用户提供人性化的自主学习机制。", "children": [], "seq": "17"}, {"name": "学习进度管理", "desc": "为用户提供线上培训学习进度管理，用户可以查看当前个人学习进度，点击任一在学课程即可快速进入学习界面，继续学习在学课程。", "children": [], "seq": "18"}, {"name": "培训学时管理", "desc": "根据用户学习课程的时长，系统自动记录用户学时，并支持用户可查看个人学时，方便用户有针对性地进行课程学习。", "children": [], "seq": "19"}], "seq": "16"}, {"name": "培训辅助管理", "desc": "", "children": [{"name": "课程点播管理", "desc": "结合课程分类和培训点击学习量的基础数据，系统按照设定规则，支持按照最新课程、热门课程向用户优先推荐，并提供在线点播功能。\n（1）最新课程计算规则：根据课程发布时间和课程分类，筛选全部类别的最新课程发布置顶；\n（2）热门课程计算规则：根据培训学习浏览驻留时间和课程点击量，筛选热门课程，并按照课程热门指数排序进行置顶。", "children": [], "seq": "20"}, {"name": "评估反馈管理", "desc": "培训评估反馈主要包括用户对培训课程内容以及讲师的评价；系统支持从课程安排合理性、课程内容可用性以及讲师表达能力方面，用户在完成课程学习后，可以通过星级打分的方式对课程进行评价，还支持用户填写相应的建议。", "children": [], "seq": "21"}, {"name": "培训课程统计", "desc": "根据培训课程学习情况，点击情况以及课程反馈情况，实现课程浏览量统计、课程学习情况统计、课程评价反馈统计。", "children": [], "seq": "22"}], "seq": "20"}], "count": 27}]}, {"name": "人工智能创新开发子系统", "modules": [{"name": "数据集管理", "levels": 3, "tree": [{"name": "数据集管理服务", "desc": "", "children": [{"name": "数据集列表", "desc": "支持以列表的形式展示所有已创建或导入的数据集的详细信息，包括名称、描述、创建日期、数据类型、大小，方便用户快速查找。", "children": [], "seq": "1"}, {"name": "数据集筛选", "desc": "支持用户根据不同的条件对数据集进行筛选，例如根据数据集名称、创建日期、数据类型。用户可以选择单一筛选或组合筛选，以缩小或扩大数据集的搜索范围。", "children": [], "seq": "2"}, {"name": "数据集详情", "desc": "提供数据集的详细信息，包括数据的统计摘要（如平均值、中位数、标准差）、特征描述（如特征名称、类型、描述）以及数据预览。同时，支持用户查看数据集的可视化图表。", "children": [], "seq": "3"}, {"name": "数据集导入", "desc": "用户上传和导入外部的数据集，支持多种常见的数据格式，平台会进行数据预处理和校验，以确保数据的质量和完整性，并为用户提供导入进度的实时反馈。", "children": [], "seq": "4"}, {"name": "数据集导出", "desc": "支持用户根据需求将选定的数据集导出为常用的数据格式，如CSV、Excel。导出的数据集可以用于备份、分享或与其他系统集成。系统提供导出数据的格式化选项，如选择导出字段、调整列顺序。", "children": [], "seq": "5"}, {"name": "数据集删除", "desc": "支持用户删除数据集，以释放存储空间并保持系统的整洁。同时，删除操作是可逆的，用户在删除数据集之前需要确认删除操作。", "children": [], "seq": "6"}, {"name": "数据集更新", "desc": "支持用户更新现有的数据集，包括添加新数据、修改现有数据和删除无效或过时的数据。平台会记录所有的更新操作，以确保数据的完整性和可追溯性。", "children": [], "seq": "7"}, {"name": "数据集排序", "desc": "支持对数据集进行排序，以便更好地组织和浏览数据。支持多种排序方式，如按升序、降序或按行号排序。用户可以选择单列排序或多列排序，以根据不同的字段进行排序。", "children": [], "seq": "8"}, {"name": "数据集搜索", "desc": "系统提供强大的搜索功能，使用户可以通过关键词或特定的筛选条件搜索数据集，快速找到所需的数据。", "children": [], "seq": "9"}, {"name": "数据集操作记录追踪", "desc": "平台会记录所有对数据集进行的操作，包括创建、更新、删除，并提供详细的日志和报告，以便用户进行审计和追踪。这些记录可以帮助用户了解数据集的历史更改和操作历史。", "children": [], "seq": "10"}, {"name": "数据集版本控制", "desc": "平台支持数据集的版本控制，允许用户保存和回滚到数据集的任何一个版本。版本控制功能可以帮助用户在多人协作时避免冲突和错误。用户可以创建新的版本分支或切换到不同的版本分支。", "children": [], "seq": "11"}, {"name": "远程存储支持", "desc": "平台支持将数据集存储在远程服务器上，提供安全的访问和管理机制，确保数据的私密性和完整性。用户可以通过平台访问远程服务器上的数据集，无需直接管理远程服务器。", "children": [], "seq": "12"}, {"name": "多用户协作", "desc": "平台支持多用户协作，允许多个用户同时对一个数据集进行操作。用户可以在平台上共享数据集、讨论问题、分配任务。平台通过版本控制和讨论版功能帮助团队成员进行有效的沟通和协作。", "children": [], "seq": "13"}], "seq": "1"}, {"name": "数据预处理", "desc": "", "children": [{"name": "数据转换", "desc": "数据转换功能主要负责将原始数据转换成更适合机器学习或数据分析的形式。这可能包括数据类型转换（如将字符串转换为数值或日期），处理缺失值或异常值，处理数据集的不平衡。数据转换的目标是优化数据集，使其更易于分析，同时尽可能保留原始数据的所有重要信息。", "children": [], "seq": "14"}, {"name": "数据归一化", "desc": "数据归一化功能则是在数据处理过程中，将特征缩放到一个特定的范围，通常是较小的范围，以消除因特征的量纲或数值范围不同而引起的差异。数据归一化可以消除不同特征间的尺度差异，使得模型的训练更加稳定。此外，归一化也可以帮助防止因输入特征的数值范围过大而导致的模型过拟合问题。", "children": [], "seq": "15"}], "seq": "14"}, {"name": "数据集概览", "desc": "", "children": [{"name": "数据样本预览", "desc": "数据样本预览功能允许用户查看数据集中的部分数据样本，以了解数据集的基本特征和内容。此功能提供一个可视化的数据预览界面，用户可以查看数据集中的前几行或前几列数据，以便快速了解数据的结构和内容。同时，用户还可以通过筛选和排序功能对数据进行初步的处理和分析。", "children": [], "seq": "16"}, {"name": "数据统计信息展示", "desc": "数据统计信息展示功能提供关于数据集的整体统计信息，例如数据集的总行数、总列数、数据类型、平均值、标准差。这些统计信息帮助用户更好地了解数据集的整体特征和分布情况。此功能还可以针对不同的数据列进行统计信息的展示，使用户能够更详细地了解每一列数据的特征。", "children": [], "seq": "17"}, {"name": "标签统计信息展示", "desc": "标签统计信息展示功能提供关于数据集中标签的统计信息，例如标签的种类、数量以及每个标签的实例数量。这些统计信息帮助用户了解标签的分布情况和多样性，从而更好地理解数据集的结构和内容。此功能还支持对不同标签的实例进行预览和筛选，使用户能够更方便地查看和分析标签数据。", "children": [], "seq": "18"}, {"name": "数据集图表展示", "desc": "数据集图表展示功能使用图表形式呈现数据集的关键信息，如数据的分布情况、变量之间的关系。此功能支持多种图表类型，如直方图、饼图、散点图、热力图，以便用户根据需要选择合适的图表来展示数据。通过图表，用户可以更直观地了解数据的分布特征、变量之间的关系以及数据的整体趋势。", "children": [], "seq": "19"}], "seq": "16"}, {"name": "数据标注", "desc": "", "children": [{"name": "标注任务管理", "desc": "支持用户创建新的标注任务，包括设置任务的名称、描述和其他相关参数。用户还可以为任务分配标签，以便更好地组织和跟踪任务进度。同时，标注任务管理还支持对已完成任务进行查看和编辑，以及对任务进度和状态的监控。", "children": [], "seq": "20"}, {"name": "数据导入", "desc": "数据导入功能允许用户将数据导入到数据集管理平台中，以进行后续的数据处理、分析和模型训练。", "children": [], "seq": "21"}, {"name": "文本数据标注", "desc": "", "children": [{"name": "情绪标注", "desc": "基于情感词典和自然语言处理技术，对文本进行情感倾向性分析，判断文本所表达的情绪是积极、消极或中性的。该功能还可以对文本中的情感进行细腻的标注，例如标注出文本中所表达的愤怒、悲伤、恐惧、惊讶、厌恶具体的情绪。", "children": [], "seq": "22"}, {"name": "意图标注", "desc": "基于自然语言处理技术和机器学习算法，对文本进行词性标注、命名实体识别、关键词提取操作，以识别文本中的主题、事件、实体关键信息。该功能可以帮助用户更好地理解文本内容，提取出文本中所表达的意图和主题，为信息检索、文本分类、问答系统应用提供支持。", "children": [], "seq": "23"}, {"name": "实体标注", "desc": "基于自然语言处理技术和实体识别算法，对文本进行命名实体识别、实体链接操作，以识别和标注文本中的实体。该功能可以帮助用户更好地理解文本内容，提取出文本中所涉及的实体信息，为知识图谱、语义网应用提供支持。", "children": [], "seq": "24"}, {"name": "关系标注", "desc": "基于自然语言处理技术和机器学习算法，对文本进行实体关系抽取、实体链接操作，以识别和标注文本中实体之间的关系。", "children": [], "seq": "25"}], "seq": "22"}, {"name": "图像数据标注", "desc": "", "children": [{"name": "2D框", "desc": "用户通过使用2D框标注方法对图像中的物体进行标注，机器学习算法能够识别并跟踪这些物体。这种标注方法可用于目标检测和跟踪任务，如人脸识别、行人检测。", "children": [], "seq": "26"}, {"name": "多边形分割", "desc": "多边形分割标注是对图像中的不规则形状的目标物体进行标注的功能。用户可以使用多边形分割标注方法对图像中的物体进行精细的标注，以便机器学习算法能够准确地识别和跟踪这些物体。这种标注方法可用于解决复杂场景中的目标检测和跟踪问题。", "children": [], "seq": "27"}, {"name": "语义分割", "desc": "支持对图像中的每个像素进行标注，以区分不同类别的物体。用户可以使用语义分割标注方法对图像中的每个像素进行分类，以便机器学习算法能够识别图像中的不同物体和场景。", "children": [], "seq": "28"}, {"name": "关键点标注", "desc": "关键点标注是对图像中的关键点进行标注的功能。用户可以通过关键点标注方法对图像中物体的关键点进行标注，如人脸特征点、肢体关节点，帮助机器学习算法更好地理解人体的姿态和动作。", "children": [], "seq": "29"}, {"name": "线标注", "desc": "线标注是对图像中的线条进行标注的功能。用户可以使用线标注方法对图像中的线条进行标注，以便机器学习算法能够识别和跟踪这些线条。这种标注方法可用于图像分割、边缘检测任务。", "children": [], "seq": "30"}], "seq": "26"}, {"name": "音频数据标注", "desc": "", "children": [{"name": "音频导入", "desc": "支持用户选择本地音频文件或在线音频文件，并可以选择单个文件或批量文件导入。导入后，音频文件将显示在音频数据标注模块的列表中，以便进行后续的标注操作。", "children": [], "seq": "31"}, {"name": "标注工具", "desc": "系统提供了一系列标注工具，包括标记工具、画框工具、涂鸦工具，用于对音频数据进行标注，用户可在音频波形图上对目标声音进行标记和注释。", "children": [], "seq": "32"}, {"name": "语音转文字", "desc": "通过语音识别技术，可以识别不同人的语音，并将其转换为准确的文本内容。转换后的文本可以在标注工具中查看和编辑。", "children": [], "seq": "33"}, {"name": "文字校对", "desc": "平台支持对语音转文字生成的文本进行校对和修正，用户可以在校对界面中查看文本内容，并使用标注工具中的画框工具、涂鸦工具进行修正和补充。", "children": [], "seq": "34"}, {"name": "情绪标注", "desc": "平台基于情感分析，识别和标注音频中的情感倾向和情绪类型。用户可以在标注工具中使用相应的颜色和形状来标记不同的情绪类型，以便后续的数据分析和处理。", "children": [], "seq": "35"}, {"name": "关键字标注", "desc": "平台支持对音频中的关键词进行标注，标注后的关键词可以用于后续的数据检索和分析，例如根据关键词对音频进行分类操作。", "children": [], "seq": "36"}, {"name": "语音切割", "desc": "平台支持将长篇的音频文件切割成较小的片段，以便进行后续的数据分析和处理。用户可以在标注工具中使用相应的工具进行切割操作，并可以对切割的片段进行标记和注释。切割后的片段可以用于语音转文字、情绪标注操作，提高数据处理的效率和准确性。", "children": [], "seq": "37"}], "seq": "31"}, {"name": "视频数据标注", "desc": "", "children": [{"name": "关键帧标注", "desc": "平台支持在视频数据标注过程中，对视频关键帧进行标记和选择，以便后续的机器学习算法能够更好地理解视频内容。", "children": [], "seq": "38"}, {"name": "目标检测与标注", "desc": "平台支持对视频中出现的人物、物体进行人脸识别和标记，方便后续的识别和跟踪任务。", "children": [], "seq": "39"}, {"name": "场景理解与标注", "desc": "平台支持对视频中的场景和环境进行描述和标记，包括视频中的背景、道具、陈设内容。这些标注有助于搜索和检索视频中的特定场景。", "children": [], "seq": "40"}, {"name": "物体识别和标注", "desc": "平台支持对视频中的物体进行检测和标记，包括各种物品、器械。这些标注有助于搜索和分类视频中的物体。", "children": [], "seq": "41"}, {"name": "事件检测与标注", "desc": "平台支持对视频中的事件进行检测和标注，包括各种动作、行为事件。这些标注有助于分析视频中的事件序列。", "children": [], "seq": "42"}, {"name": "运动轨迹提取与标注", "desc": "平台支持从视频中提取运动轨迹信息，包括人物、物体的运动轨迹。这些标注有助于分析视频中的运动模式。", "children": [], "seq": "43"}], "seq": "38"}, {"name": "标注模板", "desc": "平台支持根据不同的数据类型和应用需求定制标注模板，指导用户进行数据标注，以确保标注数据的一致性和准确性。", "children": [], "seq": "44"}, {"name": "标注结果存储", "desc": "平台支持保存标注数据的结果，包括标注的位置、形状、颜色属性信息，确保数据的安全性和可靠性。", "children": [], "seq": "45"}, {"name": "标注结果导出", "desc": "支持将标注数据导出为特定的文件格式，以便后续的数据分析和处理。导出的标注数据可以包含所有标注结果，也可以根据需要进行筛选和过滤。", "children": [], "seq": "46"}, {"name": "标注质量评估与检验", "desc": "通过抽样检查、统计指标分析方式对数据标注的质量和准确性进行评估和检验，用户可根据评估结果进行调整和优化数据标注流程，提高数据标注质量。", "children": [], "seq": "47"}, {"name": "标注数据关联与引用", "desc": "支持将标注数据与其他相关数据进行关联和引用，如图像、视频、音频数据类型。通过关联和引用，可以更好地管理和利用标注数据，提高数据分析和处理的效率。", "children": [], "seq": "48"}, {"name": "语音识别与注释", "desc": "平台支持将音频数据转换为文本形式，并进行相应的标注和处理。该功能可以应用于语音识别、语音转写领域，提高音频数据的处理效率和准确性。", "children": [], "seq": "49"}, {"name": "数据标注过程监控", "desc": "实时监控数据标注的过程和进度，确保数据标注的顺利进行。该功能可以通过可视化界面、统计报告方式展示监控结果，帮助管理员及时发现和解决问题。", "children": [], "seq": "50"}, {"name": "数据标注教程文档", "desc": "为用户提供详细的操作指南和帮助文档，以便快速了解和掌握数据标注的规范和技能。教程文档可以包括操作手册、视频教程、在线帮助内容，确保用户能够准确、高效地进行数据标注工作。", "children": [], "seq": "51"}], "seq": "20"}, {"name": "数据安全与权限管理", "desc": "", "children": [{"name": "数据安全策略管理", "desc": "数据安全策略管理功能负责定义和维护数据安全策略，包括数据的加密、解密、数据脱敏、去标识化策略。用户可以根据不同的数据类型和业务需求制定相应的数据安全策略，以确保数据的机密性、完整性和可用性。", "children": [], "seq": "52"}, {"name": "数据访问权限管理", "desc": "数据访问权限管理功能对数据访问权限进行细粒度的控制，包括对数据的读、写、删除操作权限的控制。该功能可以通过角色、部门、用户维度进行权限的分配和管理，确保数据的访问权限与业务需求相匹配。", "children": [], "seq": "53"}, {"name": "身份认证与授权管理", "desc": "身份认证与授权管理功能负责对用户进行身份认证和授权管理，包括用户注册、登录、密码找回的功能。该功能可以通过多种认证方式进行身份验证，如用户名/密码认证、动态令牌、生物特征认证，以确保只有经过授权的用户才能访问数据。", "children": [], "seq": "54"}, {"name": "访问日志与审计功能", "desc": "访问日志与审计功能记录用户对数据的访问历史记录，包括访问时间、用户身份、访问操作信息。该功能可以帮助管理员进行数据安全审计和追踪，及时发现并应对潜在的安全威胁。", "children": [], "seq": "55"}, {"name": "数据加密与解密", "desc": "数据加密与解密功能负责对数据进行加密和解密操作，以保护数据的机密性和完整性，确保数据在传输和存储过程中不被窃取或篡改。", "children": [], "seq": "56"}, {"name": "数据脱敏与去标识化", "desc": "数据脱敏与去标识化功能将敏感数据进行脱敏或去标识化处理，以保护用户的隐私和敏感信息。该功能可以将敏感数据的真实值替换为虚假值或进行匿名化处理，如将地址、电话号码信息进行脱敏处理，以防止数据泄露和滥用。", "children": [], "seq": "57"}, {"name": "异常行为监控预警", "desc": "异常行为监控预警功能通过实时监控用户对数据的访问行为和网络流量，及时发现并预警异常行为和潜在的安全威胁。该功能可以通过机器学习算法进行行为分析，识别异常操作和可疑行为，如批量删除数据、未经授权的访问，以便管理员及时采取应对措施。", "children": [], "seq": "58"}], "seq": "52"}], "count": 67}, {"name": "模型训练", "levels": 3, "tree": [{"name": "模型训练服务", "desc": "", "children": [{"name": "集成开发环境", "desc": "", "children": [{"name": "Jupyter Notebook", "desc": "系统提供Jupyter Notebook应用程序，支持用户创建和共享包含代码、文本和可视化内容的文档。在模型训练平台中，Jupyter Notebook常被用于进行数据探索、算法开发和模型训练任务。它具有实时计算和可视化功能，使得开发者可以在文档中快速迭代和分享想法。", "children": [], "seq": "1"}, {"name": "VSCode", "desc": "系统提供VSCode代码编辑器，支持多种编程语言和开发环境，在模型训练平台中，VSCode通常用于编写、调试和管理代码，以及配置实验环境和运行测试任务。VSCode具有丰富的插件和扩展，可以增强其功能和适应不同的开发需求。", "children": [], "seq": "2"}, {"name": "Rstudio", "desc": "系统支持RStudio集成开发环境（IDE），提供完整的开发工具集，包括代码编辑器、数据分析和可视化工具。在模型训练平台中，RStudio常被用于进行数据挖掘、统计分析、机器学习和人工智能任务。它支持实时计算和交互式编程，使得开发者可以更高效地进行数据处理和模型训练。RStudio还提供了丰富的包和扩展，以帮助用户快速构建和部署模型。", "children": [], "seq": "3"}], "seq": "1"}, {"name": "训练学习模式", "desc": "", "children": [{"name": "监督学习", "desc": "系统支持监督学习训练模式，在这种模式下，模型通过学习一组带有标签的训练数据来进行训练。标签通常是由人类专家根据一些预定义的标准进行手动标注的。监督学习广泛应用于图像分类、语音识别、自然语言处理领域。", "children": [], "seq": "4"}, {"name": "无监督学习", "desc": "系统支持无监督学习训练模式，在这种模式下，模型通过学习一组未带有标签的数据来进行训练，以期发现数据中的内在结构和关系。无监督学习广泛应用于市场细分、社交网络分析、异常检测领域。", "children": [], "seq": "5"}, {"name": "强化学习", "desc": "系统支持强化学习训练模式，强化学习是一种特殊的训练模式。在这种模式下，模型通过与环境进行交互并从中获得奖励或惩罚来进行训练，以期学会在特定的环境下做出最优的决策。强化学习广泛应用于游戏、机器人控制领域。", "children": [], "seq": "6"}, {"name": "半监督学习", "desc": "系统支持半监督学习训练模式，半监督学习是一种介于监督学习和无监督学习之间的训练模式。在这种模式下，模型通过学习一部分带有标签的数据和另一部分未带有标签的数据来进行训练，以期在新的数据上能够做出正确的预测。半监督学习广泛应用于文本分类、图像分割领域。", "children": [], "seq": "7"}, {"name": "自监督学习", "desc": "系统支持自监督学习训练模式，自监督学习是一种特殊的训练模式。在这种模式下，模型通过学习一组未带有标签的数据来进行训练，但这些数据是通过模型自身生成的标签来进行标注的。自监督学习广泛应用于自然语言处理、计算机视觉领域。", "children": [], "seq": "8"}], "seq": "4"}, {"name": "分布式训练", "desc": "系统支持分布式训练，通过将训练任务分布在多个计算节点上进行，可以利用多台计算机的并行计算能力，加快训练速度，同时也可以提高模型的准确性和泛化能力。常见的分布式训练框架包括Spark、Hadoop。", "children": [], "seq": "9"}, {"name": "GPU加速训练", "desc": "系统支持GPU加速训练，在GPU加速训练中，通常会将计算量较大的部分（例如前向传播、反向传播）转移到GPU上进行计算，从而加快模型的训练速度。同时，GPU加速训练也可以降低模型的内存占用，使得更大的模型能够在有限的内存中完成训练。", "children": [], "seq": "10"}, {"name": "多任务联合训练", "desc": "系统支持多任务联合训练，在多任务联合训练中，多个任务的数据会共同输入到一个模型中进行学习。通过共享模型的参数，不同任务之间可以相互辅助，从而提高每个任务的性能。常见的多任务联合训练框架包括Multi-task Learning、Co-training。", "children": [], "seq": "11"}, {"name": "大模型训练", "desc": "系统支持大模型训练，在大模型训练中，通常需要使用大量的计算资源来进行模型的训练和推理。为了提高训练效率，通常会采用分布式训练或GPU加速训练技术。同时，在大模型训练中也需要关注模型优化、防止过拟合问题，从而保证模型的准确性和泛化能力。", "children": [], "seq": "12"}, {"name": "算法模型库", "desc": "构建算法模型库，为用户提供各种机器学习和深度学习算法模型的集合。通过这个库，用户可以轻松地选择、训练、比较和部署各种算法模型，以解决各种复杂的问题和任务。同时，算法模型库还支持自定义模型的训练和微调。用户可以利用其提供的工具和框架来提高模型的性能和准确性，并将模型应用于实际场景中。", "children": [], "seq": "13"}, {"name": "自定义训练任务", "desc": "模型训练平台支持自定义训练任务，允许用户根据自己的特定需求和数据集来定义和配置训练任务。这种灵活性使得开发者能够针对各种复杂的问题和场景进行模型训练，从而实现更精确和有效的预测和决策。通过自定义训练任务，用户可以调整模型结构、优化算法、损失函数参数，以达到最佳的训练效果。这有助于释放模型训练平台的潜力，满足各种实际应用的需求。", "children": [], "seq": "14"}, {"name": "训练流水线", "desc": "模型训练平台支持训练流水线，支持用户将多个训练任务连接在一起，形成一个连续的训练流程。每个训练任务可以是一个独立的算法模型，也可以是另一个训练流水线的一部分。通过训练流水线，用户可以轻松地实现多任务联合训练、模型集成和组合复杂训练流程。", "children": [], "seq": "15"}, {"name": "模型选择", "desc": "支持模型选择功能，支持用户可以根据自己的需求和数据集来选择合适的算法模型进行训练。", "children": [], "seq": "16"}, {"name": "训练参数设置", "desc": "", "children": [{"name": "学习率策略设置", "desc": "系统提供一系列可配置的学习率策略，例如固定学习率、动态学习率。用户可以根据自己的需求和数据集来选择合适的学习率策略，并调整学习率的大小。通过合理地设置学习率策略，用户可以加速模型的训练过程，提高模型的准确性和泛化能力。", "children": [], "seq": "17"}, {"name": "正则化策略设置", "desc": "系统提供一系列可配置的正则化策略，例如L1正则化、L2正则化、Dropout。用户可以根据自己的需求和数据集来选择合适的正则化策略，并调整正则化的强度。通过合理地设置正则化策略，用户可以增强模型的泛化能力，提高模型的鲁棒性和准确性。", "children": [], "seq": "18"}, {"name": "批次大小设置", "desc": "平台支持用户设置每次训练迭代中使用的样本批次大小，批次大小的选择会影响模型的收敛速度和内存占用情况。较大的批次大小可以提高模型的并行计算能力，但可能会导致内存不足；较小的批次大小可以减少内存占用，但可能会影响模型的收敛速度。", "children": [], "seq": "19"}, {"name": "训练轮数设置", "desc": "平台支持用户根据实际情况设置训练轮数。训练轮数的选择会影响模型的收敛速度和泛化能力。过多的训练轮数可能会导致过拟合，而较少的训练轮数可能无法充分利用数据集的信息。", "children": [], "seq": "20"}], "seq": "17"}], "seq": "1"}, {"name": "训练支撑服务", "desc": "", "children": [{"name": "迁移学习", "desc": "系统提供迁移学习的支持，允许用户上传预训练模型，并根据新任务的数据特征进行微调，大大减少新任务的训练时间和计算资源。", "children": [], "seq": "21"}, {"name": "自动调参", "desc": "系统提供自动调参的功能，例如使用网格搜索、随机搜索、贝叶斯优化算法进行超参数的搜索和调整，帮助用户找到最优的超参数配置。", "children": [], "seq": "22"}, {"name": "自动早停", "desc": "系统提供自动早停的功能，通过监视模型在验证集上的性能来决定停止训练的时间，当验证集的性能达到最佳时，可以自动停止训练，并保存最佳的模型参数，帮助用户防止过拟合。", "children": [], "seq": "23"}, {"name": "在线调试", "desc": "系统提供在线调试的功能，允许用户实时查看模型的训练过程、准确率指标，以便进行调试和优化。这可以帮助用户及时发现和解决问题，提高模型的训练质量和效率。", "children": [], "seq": "24"}, {"name": "半自动或自动标注", "desc": "系统提供半自动或自动标注的功能，利用计算机视觉、自然语言处理技术辅助用户进行数据标注。这可以帮助用户提高数据标注的效率和质量，同时降低人力成本。", "children": [], "seq": "25"}, {"name": "动态调整学习率", "desc": "系统提供动态调整学习率的功能，例如使用学习率衰减算法、学习率预见性控制，支持根据模型的训练情况和性能指标，动态调整学习率以优化模型的训练效果，这可以帮助用户更好地控制模型的训练过程，提高模型的收敛速度和性能。", "children": [], "seq": "26"}, {"name": "数据卷管理", "desc": "", "children": [{"name": "数据卷创建", "desc": "支持用户根据需要创建一个新的数据卷，可以指定数据卷的名称、存储类型、大小参数。创建数据卷时，平台通常会提供多种存储选项，如本地存储、分布式文件系统、云存储，用户可以根据实际需求选择合适的存储类型。", "children": [], "seq": "27"}, {"name": "数据卷挂载", "desc": "支持用户将数据卷挂载到模型训练任务中，使其可以被任务所使用。挂载操作可以指定挂载的路径和挂载选项，如只读挂载、读写挂载。通过挂载数据卷，用户可以将训练任务需要的数据准备好，并确保数据的安全性和可用性。", "children": [], "seq": "28"}, {"name": "数据卷卸载", "desc": "支持用户将已挂载的数据卷卸载，以释放资源并保护数据的安全。卸载操作会将数据卷从系统中移除，并将相关的文件和目录一并删除。在卸载数据卷之前，需要进行一些清理操作，以确保数据的完整性和一致性。", "children": [], "seq": "29"}, {"name": "数据卷删除", "desc": "用户永久删除不再需要的数据卷。删除操作会删除数据卷及其所有挂载点上的数据，无法恢复。在删除数据卷之前，需要进行确认操作，以防止误删重要数据。", "children": [], "seq": "30"}], "seq": "27"}, {"name": "配额管理", "desc": "平台支持为用户设置处理器、GPU、内存、数据卷资源的配额，防止用户过度使用平台的计算资源和存储资源，确保资源的合理分配和有效利用。", "children": [], "seq": "31"}, {"name": "租户隔离", "desc": "平台为每名租户创建私有的命名空间，租户的所有任务都运行在这个命名空间中，其他租户无法访问这个命名空间。", "children": [], "seq": "32"}], "seq": "21"}, {"name": "训练分析服务", "desc": "", "children": [{"name": "模型性能评估", "desc": "系统提供模型性能评估的功能，帮助用户评估模型的性能和效率。这可以通过计算模型的准确性、精确率、召回率指标来实现，或者使用其他更高级的评估指标。通过模型性能评估，用户可以了解模型的优劣，并进行必要的调整和优化。", "children": [], "seq": "33"}, {"name": "异常检测", "desc": "系统提供异常检测的功能，帮助用户检测模型训练过程中的异常和异常数据。这可以通过设置阈值、统计量检验、时间序列分析方式来实现。通过异常检测，用户可以及时发现和解决异常情况。", sc": "模型实时推理服务支持多种类型的模型和数据输入，通过集成模型和服务框架，实现对输入数据的实时预测和响应。同时，该服务还具备异常处理和资源优化的能力，能够及时发现并处理问题，确保服务的稳定性和可用性。", "children": [], "seq": "20"}], "seq": "14"}, {"name": "接口服务", "desc": "", "children": [{"name": "gRPC接口服务", "desc": "支持用户通过gRPC接口向推理服务发送推理请求。", "children": [], "seq": "21"}, {"name": "RESTful接口服务", "desc": "支持用户通过RESTful接口向推理服务发送推理请求。", "children": [], "seq": "22"}], "seq": "21"}, {"name": "模型监控", "desc": "", "children": [{"name": "GPU利用率监测", "desc": "利用特定的工具和API实时监测GPU利用率，及时发现潜在的GPU资源瓶颈，避免浪费时间和金钱，并优化模型训练和推理过程，提高整体效率。同时，模型监控GPU利用率还可以帮助用户更好地理解和评估模型训练和推理的性能表现。", "children": [], "seq": "23"}, {"name": "GPU延迟情况监测", "desc": "通过使用深度学习框架提供的API或工具包，以及操作系统或硬件厂商提供的监控工具，可以获取GPU延迟信息，抓取模型推理的性能和响应速度情况。", "children": [], "seq": "24"}, {"name": "GPU内存使用率监测", "desc": "通过GPU使用率监测技术，能够实时跟踪和报告GPU在模型训练或推理过程中的使用情况。", "children": [], "seq": "25"}, {"name": "推理吞吐量监测", "desc": "通过使用性能分析器工具，推理吞吐量监测能够实时监测模型推理过程中每秒处理的样本数量，实时获取模型推理的速度和质量信息，帮助我们了解模型在处理大量数据时的性能表现。", "children": [], "seq": "26"}, {"name": "限流监测", "desc": "为了确保模型推理服务在面对大量并发请求时能够稳定运行，同时防止因过载导致服务性能下降或崩溃。通过制定合理的限流策略、实时监控性能指标、设置限流阈值以及异常处理措施，可以实现对模型推理请求的有效管理和限制，确保系统能够稳定运行并为客户提供高质量的服务。", "children": [], "seq": "27"}], "seq": "23"}, {"name": "推理服务调优", "desc": "", "children": [{"name": "评估推理服务配置", "desc": "支持对评估推理服务规则进行配置，便于系统获取推理服务的状态和性能指标，并支持对其进行科学的深入分析和可视化。", "children": [], "seq": "28"}, {"name": "生成评估报告", "desc": "通过收集推理服务的相关数据，包括GPU利用率、延迟和吞吐量的数据，利用专业的性能分析工具进行处理和分析，生成详细的评估报告，为用户提供重要的支持和参考，帮助其更好地管理和优化推理服务。", "children": [], "seq": "29"}], "seq": "28"}, {"name": "可视化界面", "desc": "为了帮助用户更加便捷对模型推理应用进行操作，通过打造推理服务的可视化管理界面，使得用户直观、高效地管理和使用推理服务。", "children": [], "seq": "30"}, {"name": "推理服务鉴权", "desc": "支持推理服务鉴权，防止未经授权的用户访问推理服务。", "children": [], "seq": "31"}], "count": 40}, {"name": "模型管理", "levels": 3, "tree": [{"name": "模型开源许可证管理", "desc": "提供模型开源许可证管理的功能，平台管理员可以对平台支持的开源许可证类型进行统一维护，如Apache License 2.0、GPL-2.0、LGPL-3.0、MIT License、LGPL-2.1。", "children": [], "seq": "1"}, {"name": "模型任务类型管理", "desc": "提供模型任务类型管理的功能，平台管理员可以对平台支持的模型任务类型分大类和小类进行统一维护，大类任务类型如计算机视觉、自然处理语言、语音、多模态、其他，小类任务类型如视觉分类、视觉生成、文本生成、词性标注、语音识别、语音合成、图文检索。", "children": [], "seq": "2"}, {"name": "AI框架管理", "desc": "提供AI框架管理的功能，平台管理员可以对平台支持的AI框架类型进行统一维护，如PyTorch、TensorFlow、MindSpore。", "children": [], "seq": "3"}, {"name": "模型存储管理", "desc": "", "children": [{"name": "默认存储分配", "desc": "用户创建模型后，系统可以为每个模型自动建立固定额度的模型仓库存储空间，实现默认存储自动分配。", "children": [], "seq": "4"}, {"name": "存储扩容管理", "desc": "", "children": [{"name": "用户扩容申请", "desc": "若系统分配默认存储空间无法满足用户使用需求，用户可以根据需要的模型存储空间，进行扩容申请，填写申请描述后提交至平台管理员进行审核。", "children": [], "seq": "5"}, {"name": "用户扩容审核", "desc": "平台管理员可根据用户扩容申请意见对扩容申请进行审核，审核通过后可以对用户模型存储空间进行扩容配置。", "children": [], "seq": "6"}, {"name": "扩容空间配置", "desc": "平台管理员审核通过后，可以对用户申请的模型扩容进行存储空间配置，设置增加多少存储空间并分配给该用户用于模型的存储使用。", "children": [], "seq": "7"}], "seq": "5"}, {"name": "存储空间监控与统计", "desc": "系统提供存储空间监控与统计的功能，支持以统计图表的形式对平台活跃用户所占的模型存储空间和非活跃用户所占的模型存储空间分别进行统计和展示，为管理员合理分配模型存储空间提供科学参考依据。", "children": [], "seq": "8"}], "seq": "4"}, {"name": "模型库管理", "desc": "", "children": [{"name": "模型创建", "desc": "支持填写或选择模型英文名称、模型中文名称、所有者、是否开源、开源许可、任务类型、AI框架类型、是否公开、模型描述、高级配置信息来进行模型创建。", "children": [], "seq": "9"}, {"name": "模型介绍文件上传", "desc": "提供模型介绍文件上传的功能，用户可编辑模型的介绍信息并上传至平台进行展示。", "children": [], "seq": "10"}, {"name": "模型文件管理", "desc": "", "children": [{"name": "模型文件上传", "desc": "提供模型文件上传的功能，用户通过工作台中获取的访问令牌，将模型文件通过Python SDK或是Git的方式上传至平台。上传成功后模型文件将会以列表的形式进行展示，并且支持查看模型文件名称、大小和上传时间信息。", "children": [], "seq": "11"}, {"name": "模型文件预览", "desc": "提供模型文件在线预览的功能，平台支持对如下文件类型进行在线预览查看：.md、.txt、.json、.py、.yaml、.yml、.gitattributes、.gitignore、.html、.bmp、.jpg、.jpeg、.png、Dockerfile、.sh。若文件大小超过1M,平台将不再支持预览。", "children": [], "seq": "12"}, {"name": "模型文件下载", "desc": "提供模型文件下载的功能，支持用户在权限范围内，下载感兴趣的模型文件至本地进行查看。", "children": [], "seq": "13"}], "seq": "11"}, {"name": "模型版本管理", "desc": "提供模型版本管理的功能，支持记录模型文件的历史版本信息，同时支持按需设置模型版本号和分支信息，方便用户快速的对模型版本进行管理。", "children": [], "seq": "14"}], "seq": "9"}, {"name": "热门任务", "desc": "围绕热度指标，如更新频次、下载次数，支持按照不同模型任务类型的热度，筛选展示热度较高的任务类型，以便于用户快速定位热门任务类型的模型。", "children": [], "seq": "15"}, {"name": "模型标签分类筛选", "desc": "支持按照任务类型或按组织，快速筛选展示对应任务类型或组织的模型集合。", "children": [], "seq": "16"}, {"name": "模型查询", "desc": "提供模型查询的功能，用户可以通过输入关键字，从模型集合中检索出符合条件的模型，帮助用户快速、准确地获取符合检索要求的模型信息。", "children": [], "seq": "17"}, {"name": "模型权限管理", "desc": "提供模型权限管理的功能，支持管理员对不同用户或用户组赋予不同的权限，以控制他们对模型信息的访问和操作。", "children": [], "seq": "18"}], "count": 22}, {"name": "模型资源服务", "levels": 2, "tree": [{"name": "基础大模型集成", "desc": "", "children": [{"name": "语言大模型集成", "desc": "语言大模型的本质其实是中文预训练大模型。语言大模型能够实现行业知识检索回答、文案生成、阅读理解基础功能，还具备代码生成、插件调用、模型调用的高阶特性，并且具有海量数据集、推理能力、多任务促进、多模型调优、多插件补齐、全场景覆盖的功能优势，被广泛应用于智能客服、创意营销、会议助手、代码助手、企业信息搜索典型场景。为了促进跨领域合作与创新，本项目在实现语言大模型的集成和版本更新迭代的同时，将模型与硬件设备环境进行适配，以适应不断变化的需求和场景。", "children": [], "seq": "1"}, {"name": "CV大模型集成", "desc": "CV大模型是基于海量图像、视频数据和独特技术构筑的视觉基础模型，赋能行业客户利用少量场景数据对模型微调即可实现特定场景任务，功能包括基础模型、万物检测、万物分割。其中，基础模型支持图像分类、物体检测、姿态估计近10种微调任务，覆盖大部分视觉感知场景；万物检测能够根据提示对图片中的目标进行检测，解决场景碎片化问题，无需提供训练数据；万物分割能够根据提示对图片中的目标进行分割，常在辅助标注、AIGC场景应用。CV大模型广泛应用于工业生产、设备巡检、智慧城市领域。本项目在实现CV大模型的集成和版本更新迭代的同时，将模型与硬件设备环境进行适配，以适应不断变化的需求和场景。", "children": [], "seq": "2"}, {"name": "多模态大模型集成", "desc": "多模态大模型融合语言和视觉跨模态信息，实现图像生成、图像理解、3D生成、视频生成应用。图像生成是利用大数据和深度学习，将用户输入“灵感”转化为高质量图片，重塑视觉艺术形态；图像理解支持深度结构图像色彩、形状和纹理，以解读图像中隐藏的意义和情感；3D生成能够快速构建三维模型，构筑立体的世界；视频生成能够加速视频创作，助力破解各种复杂的视频创作场景，如创作灵感偶尔短路、精力分配不均、画面/音频选择困难。该模型广泛应用于平面设计、游戏开发、影视制作、电商营销领域。本项目在实现多模态大模型的集成和版本更新迭代的同时，将模型与硬件设备环境进行适配，以适应不断变化的需求和场景。", "children": [], "seq": "3"}], "seq": "1"}, {"name": "行业大模型集成", "desc": "", "children": [{"name": "政务大模型集成", "desc": "政务大模型具备强大的政务事项理解能力、多维度的信息关联能力、面向复杂事项和复杂流程的多元交互能力，能够助力政府实现一网统管、一网统感、一网通览、一网通办、一网通服、一网通协，加速政务应用现代化、智能化，赋能城市管理智能升级。 本项目实现政务大模型的集成和版本更新迭代的同时，将模型与硬件设备环境进行适配，以适应不断变化的需求和场景。", "children": [], "seq": "4"}, {"name": "金融大模型集成", "desc": "金融大模型通过对金融领域数据（资讯、公告、研报、结构化数据）和语种强化数据（金融教材、金融百科、政府报告、法规条例）的学习和预训练，并通过大量不同类型的金融专属任务指令微调，使金融大模型具备金融领域方面准确的理解能力。本项目实现在金融大模型的集成和版本更新迭代的同时，将模型与硬件设备环境进行适配，以适应不断变化的需求和场景。", "children": [], "seq": "5"}, {"name": "医药大模型集成", "desc": "医药大 "name": "多镜像仓库同步", "desc": "系统提供多镜像仓库同步功能，支持多个镜像仓库之间的镜像同步，多镜像仓库同步可以提高镜像的可用性和安全性，降低镜像管理的成本和风险。", "children": [], "seq": "7"}], "seq": "6"}, {"name": "镜像日志管理", "desc": "", "children": [{"name": "镜像日志管理", "desc": "系统提供日志管理功能，支持查看镜像管理系统的运行日志、错误日志、访问日志，以便于管理员进行故障排除、系统监控、安全审计任务。", "children": [], "seq": "8"}, {"name": "镜像日志审计管理", "desc": "系统提供审计管理功能，记录用户对项目的创建、删除、修改操作，方便管理员进行审计和追踪。", "children": [], "seq": "9"}], "seq": "8"}, {"name": "镜像服务管理", "desc": "", "children": [{"name": "镜像用户管理", "desc": "系统提供镜像用户管理功能，支持创建新的用户或者修改已有用户的权限和密码。", "children": [], "seq": "10"}, {"name": "多租户支持", "desc": "系统提供多租户模式，支持同时为多个租户提供服务，每个租户的数据和操作相互隔离，且每个租户可以有自己的独立日志审计系统，从而提高用户的使用效率，并能保护用户数据安全。", "children": [], "seq": "11"}, {"name": "配额管理", "desc": "", "children": [{"name": "存储配额", "desc": "系统提供存储配额功能，支持工作人员限制用户在平台存储配额的大小，避免资源浪费和超出存储容量。", "children": [], "seq": "12"}, {"name": "带宽配额", "desc": "系统提供带宽配额功能，支持工作人员限制用户在平台中使用带宽的速率，避免网络拥堵和影响其他用户的使用体验。", "children": [], "seq": "13"}, {"name": "CPU配额", "desc": "系统提供CPU配额功能，支持工作人员限制用户在平台中使用的CPU核数和频率，避免过度占用资源导致服务器负载过高。", "children": [], "seq": "14"}, {"name": "内存配额", "desc": "系统提供内存配额功能，支持工作人员限制用户在平台中使用的内存大小，避免资源浪费和超出内存容量。", "children": [], "seq": "15"}], "seq": "12"}, {"name": "监控中心", "desc": "系统提供监控和告警中心功能，允许管理员实时监控系统的运行状态、性能指标以及接收和处理告警信息。", "children": [], "seq": "16"}], "seq": "10"}, {"name": "镜像系统配置", "desc": "", "children": [{"name": "权限管理", "desc": "系统提供权限管理功能，支持工作人员设置用户访问权限，确保用户只能访问对应的区域。", "children": [], "seq": "17"}, {"name": "配置管理", "desc": "系统提供配置管理功能，支持修改镜像系统的配置，包括便签、认证模式、用户自注册。", "children": [], "seq": "18"}, {"name": "策略管理", "desc": "系统支持对镜像仓库的访问进行策略管理，包括对镜像的读取、写入和删除操作的权限控制。", "children": [], "seq": "19"}, {"name": "漏洞扫描", "desc": "系统会定期对仓库中的镜像进行扫描，并进行策略检查，以防止部署出易受到攻击的镜像。", "children": [], "seq": "20"}, {"name": "可视化界面", "desc": "系统提供可视化界面，使用户可以方便地进行镜像管理、用户管理和配置管理操作。", "children": [], "seq": "21"}], "seq": "17"}], "seq": "5"}], "count": 28}]}]};
const STATS = {"sys": 2, "mod": 12, "leaf": 645, "node": 787};
</script>
<script>
/* ---------- state ---------- */
let curSys=null, curMod=null, searchTerm='';

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

/* ---------- stats ---------- */
function renderStats(){
  const defs=[['sys','子系统'],['mod','功能模块'],['node','功能节点'],['leaf','末级功能']];
  $('#stats').innerHTML=defs.map(([k,l])=>
    `<div class="stat"><div class="n">${STATS[k]}</div><div class="l">${l}</div></div>`).join('');
  $('#fLeaf').textContent=STATS.leaf;
}

/* ---------- overview ---------- */
function leafCount(ns){let c=0;for(const n of ns){c+=n.children&&n.children.length?leafCount(n.children):1;}return c;}

function renderOverview(){
  const g=$('#sysGrid'); g.innerHTML='';
  DATA.subsystems.forEach((s,si)=>{
    const col=el('div','sys-col '+(si===0?'s1':'s2'));
    const modLeaf=s.modules.reduce((a,m)=>a+leafCount(m.tree),0);
    col.appendChild(el('h2',null,`<span class="dot"></span>${esc(s.name)}`));
    col.appendChild(el('div','meta',`${s.modules.length} 个功能模块 · ${modLeaf} 项末级功能`));
    const list=el('div','mod-list');
    s.modules.forEach((m,mi)=>{
      const card=el('div','mod-card');
      const firstDesc=findFirstDesc(m.tree);
      card.innerHTML=`<div class="mt">${esc(m.name)}<span class="badge">${leafCount(m.tree)} 项 · ${m.levels} 级</span></div>`+
        `<div class="preview">${esc(m.tree.map(n=>n.name).join(' · '))}</div>`;
      card.onclick=()=>openModule(si,mi);
      list.appendChild(card);
    });
    col.appendChild(list);
    g.appendChild(col);
  });
}
function findFirstDesc(ns){for(const n of ns){if(n.desc)return n.desc;const d=findFirstDesc(n.children||[]);if(d)return d;}return'';}

/* ---------- module detail ---------- */
function openModule(si,mi){
  curSys=si;curMod=mi;searchTerm='';$('#q').value='';
  const s=DATA.subsystems[si], m=s.modules[mi];
  $('#view-overview').classList.remove('on');
  $('#view-detail').classList.add('on');
  $('#detail-head').innerHTML=
    `<div class="title">${esc(m.name)}</div>`+
    `<span class="tag">${esc(s.name)}</span>`+
    `<span class="tag">${m.levels} 级结构</span>`+
    `<span class="tag">${leafCount(m.tree)} 项末级功能</span>`;
  renderTree(m.tree);
  renderCrumbs();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nodeId(){return 'n'+(nodeId._i=(nodeId._i||0)+1);}

function renderTree(tree){
  const root=$('#tree'); root.innerHTML='';
  nodeId._i=0;
  tree.forEach(n=>root.appendChild(buildNode(n,1)));
}

function buildNode(n,level){
  const wrap=el('div','tnode');
  const hasKids=n.children&&n.children.length>0;
  const card=el('div','node-card lv'+Math.min(level,4)+(hasKids?' has-children':' leaf'));
  let inner='';
  if(hasKids){
    inner+=`<span class="tog">+</span>`;
  }else{
    inner+=`<span class="tog" style="visibility:hidden">·</span>`;
  }
  inner+=`<span class="nm">${esc(n.name)}</span>`;
  if(hasKids) inner+=`<span class="ct">(${n.children.length})</span>`;
  if(n.desc) inner+=`<span class="desc-i" title="查看说明">i</span>`;
  card.innerHTML=inner;

  const row=el('div','row'); row.appendChild(card); wrap.appendChild(row);

  // description block
  let descEl=null;
  if(n.desc){
    descEl=el('div','leaf-desc',esc(n.desc));
    wrap.appendChild(descEl);
    card.querySelector('.desc-i').onclick=(e)=>{e.stopPropagation();descEl.classList.toggle('show');};
  }

  // children
  let kidsEl=null;
  if(hasKids){
    kidsEl=el('div','children collapsed');
    n.children.forEach(c=>kidsEl.appendChild(buildNode(c,level+1)));
    wrap.appendChild(kidsEl);
    card.onclick=()=>{
      const open=kidsEl.classList.toggle('collapsed')===false;
      card.classList.toggle('open',open);
      card.querySelector('.tog').textContent=open?'−':'+';
    };
  }
  wrap._refs={card,kidsEl,descEl,node:n};
  return wrap;
}

/* ---------- expand / collapse ---------- */
function setAll(open){
  $('#tree').querySelectorAll('.tnode').forEach(w=>{
    const r=w._refs; if(!r||!r.kidsEl)return;
    r.kidsEl.classList.toggle('collapsed',!open);
    r.card.classList.toggle('open',open);
    const t=r.card.querySelector('.tog'); if(t&&r.kidsEl)t.textContent=open?'−':'+';
  });
}

/* ---------- crumbs ---------- */
function renderCrumbs(){
  const c=$('#crumbs');
  if($('#view-overview').classList.contains('on')){
    c.innerHTML=`<b>总览</b>`;return;
  }
  const s=DATA.subsystems[curSys], m=s.modules[curMod];
  c.innerHTML=`<span class="c" onclick="goHome()">平台总览</span><span class="sep">/</span>`+
    `<span>${esc(s.name)}</span><span class="sep">/</span><b>${esc(m.name)}</b>`;
}

function goHome(){
  curSys=curMod=null;searchTerm='';$('#q').value='';
  $('#view-detail').classList.remove('on');
  $('#view-overview').classList.add('on');
  renderCrumbs();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---------- search ---------- */
function runSearch(term){
  term=term.trim().toLowerCase();
  if($('#view-overview').classList.contains('on')){
    // jump into first matching module? Instead filter module cards
    overviewFilter(term); return;
  }
  if(!term){renderTree(DATA.subsystems[curSys].modules[curMod].tree);return;}
  // within module: show path to matches, expand & highlight
  setAll(true);
  const tree=$('#tree');
  tree.querySelectorAll('.tnode').forEach(w=>{
    const r=w._refs; if(!r)return;
    const nm=r.node.name.toLowerCase(), ds=(r.node.desc||'').toLowerCase();
    const hit=nm.includes(term)||ds.includes(term);
    w.dataset.hit=hit?'1':'0';
  });
  // hide nodes whose subtree has no hit
  function mark(w){
    const r=w._refs;
    let any=w.dataset.hit==='1';
    const kids=r.kidsEl?[...r.kidsEl.children]:[];
    kids.forEach(k=>{if(mark(k))any=true;});
    w.style.display=any?'':'none';
    if(any&&r.kidsEl){r.kidsEl.classList.remove('collapsed');r.card.classList.add('open');
      const t=r.card.querySelector('.tog');if(t)t.textContent='−';}
    // highlight
    const nmEl=r.card.querySelector('.nm');
    nmEl.innerHTML=hl(r.node.name,term);
    return any;
  }
  [...tree.children].forEach(mark);
}
function hl(text,term){
  if(!term)return esc(text);
  const i=text.toLowerCase().indexOf(term);
  if(i<0)return esc(text);
  return esc(text.slice(0,i))+'<span class="hl">'+esc(text.slice(i,i+term.length))+'</span>'+esc(text.slice(i+term.length));
}
function overviewFilter(term){
  document.querySelectorAll('#sysGrid .mod-card').forEach(c=>{
    const t=c.textContent.toLowerCase();
    c.style.display=(!term||t.includes(term))?'':'none';
  });
}

/* ---------- wire up ---------- */
renderStats();
renderOverview();
renderCrumbs();
$('#btnExpand').onclick=()=>{if(curMod!=null)setAll(true);};
$('#btnCollapse').onclick=()=>{if(curMod!=null)setAll(false);};
$('#btnHome').onclick=goHome;
$('#q').oninput=e=>runSearch(e.target.value);
$('#q').addEventListener('keydown',e=>{if(e.key==='Escape'){e.target.value='';runSearch('');}});

</script>
